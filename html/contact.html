        <h2>Contact Me</h2>
        <p>If you have any questions or would like to get in touch, you can reach me either by emailing mt102 **AT** rice.edu or completing the form below:</p>
        <form action="../php/contact.php" method="post">

            </div>

                <button type="submit">Send Message</button>
            </div>
